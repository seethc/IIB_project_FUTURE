<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2>Tokens</h2>
                <button id="add-device-btn" class="icon-btn" title="Add Device">
                    <i data-feather="plus"></i>
                </button>
            </div>
            <ul id="device-list" class="device-list">
                <!-- Devices will be injected here -->
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content glass-panel" id="main-view">
            <div class="empty-state" id="empty-state">
                <i data-feather="cpu" class="empty-icon"></i>
                <h3>Select a Token Device</h3>
                <p>Register or select a device to view its authenticator code.</p>
            </div>

            <div class="totp-view hidden" id="totp-view">
                <div class="totp-header">
                    <h2 id="active-device-name">Device Name</h2>
                    <button id="delete-device-btn" class="icon-btn danger" title="Delete Device">
                        <i data-feather="trash-2"></i>
                    </button>
                </div>
                
                <div class="totp-display-container">
                    <div class="circular-progress-wrapper">
                        <svg class="circular-progress" viewBox="0 0 100 100">
                            <circle class="circular-progress-bg" cx="50" cy="50" r="45"></circle>
                            <circle class="circular-progress-value" id="progress-circle" cx="50" cy="50" r="45"></circle>
                        </svg>
                        <div class="totp-code" id="totp-code">------</div>
                    </div>
                </div>
                
                <p class="sync-info">Powered by shared RTC clock synchronization.</p>
            </div>
        </main>
    </div>

    <!-- Registration Modal -->
    <div class="modal hidden" id="register-modal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3>Register New Device</h3>
                <button class="icon-btn close-modal"><i data-feather="x"></i></button>
            </div>
            <div class="modal-body">
                <p class="modal-desc">Connect the ATtiny3216 to the Raspberry Pi over UART for provisioning.</p>
                <form id="register-form">
                    <div class="input-group">
                        <label for="device-name">Device Name</label>
                        <input type="text" id="device-name" placeholder="e.g. Work Email, Personal Key" required autocomplete="off">
                    </div>
                    <button type="submit" class="primary-btn" id="register-submit-btn">
                        <span class="btn-text">Provision Device</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
        feather.replace();
    </script>
</body>
</html>
